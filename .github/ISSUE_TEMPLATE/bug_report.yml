name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues first.
        For security vulnerabilities, do **not** file here — see SECURITY.md.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform(s)
      multiple: true
      options:
        - iOS
        - Android
        - Web
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Run `bunx expo-doctor@latest` and `bun --version`; paste anything relevant.
      placeholder: |
        Expo SDK: 56
        bun: x.y.z
        Device/OS: iPhone 15, iOS 18
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
